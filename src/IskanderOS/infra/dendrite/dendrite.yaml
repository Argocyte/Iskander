# Dendrite Monolith Configuration — Project Iskander Phase 14A
# Reference: https://github.com/matrix-org/dendrite/blob/main/dendrite-sample.monolith.yaml
#
# This configuration runs Dendrite as a monolith process (all components in one).
# For a production cooperative deployment, consider the polylith mode with
# separate microservices for improved resilience.

version: 2

global:
  server_name: "iskander.local"    # Must match matrix_domain in backend/config.py
  private_key: /var/dendrite/matrix_key.pem  # Generated on first boot by Dendrite

  # JetStream is the internal message queue. In-process for monolith mode.
  jetstream:
    storage_path: /var/dendrite/jetstream

  # Use the same PostgreSQL instance as Iskander — separate database.
  database:
    connection_string: "postgresql://iskander:${POSTGRES_PASSWORD}@postgres/iskander_matrix?sslmode=disable"
    max_open_conns: 10
    max_idle_conns: 5

  cache:
    max_size_estimated: 1gb
    max_age: 1h

  # DNS caching for federation.
  dns_cache:
    enabled: true
    cache_size: 256
    cache_lifetime: "5m"

app_service_api:
  # Path to the Iskander application service registration file.
  # Dendrite reads this on startup to know which users/rooms the appservice manages.
  config_files:
    - /etc/dendrite/appservice-iskander.yaml

client_api:
  registration_disabled: true    # Members are provisioned via CoopIdentity, not self-registration
  guests_disabled: true
  # Rate limiting — relax for LAN-only cooperative deployments.
  rate_limiting:
    enabled: false

federation_api:
  send_max_retries: 16
  disable_tls_validation: false  # Set true only on isolated LANs

media_api:
  base_path: /var/dendrite/media
  max_file_size_bytes: 10485760  # 10 MB

sync_api:
  search:
    enabled: false  # Enable if you add Bleve/ES; not needed for core use

user_api:
  bcrypt_cost: 10
  auto_join_rooms: []  # Could pre-join: ["#iskander_general:iskander.local"]

# MSC2836 (threads) and other experimental MSCs — disabled by default.
mscs:
  mscs: []

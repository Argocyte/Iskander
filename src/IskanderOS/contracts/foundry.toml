[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"
solc    = "0.8.24"
optimizer       = true
optimizer_runs  = 200
via_ir          = false

# ── RPC Endpoints ─────────────────────────────────────────────────────────────
[rpc_endpoints]
anvil           = "http://localhost:8545"
gnosis          = "${GNOSIS_RPC_URL}"
gnosis_fallback = "https://gnosis-pokt.nodies.app"

# ── Block Explorers (contract verification) ───────────────────────────────────
[etherscan]
# Local Anvil — no real explorer
anvil  = { key = "none", url = "http://localhost:8545" }
# Gnosis Chain — Gnosisscan (Blockscout-compatible API)
gnosis = { key = "${GNOSISSCAN_API_KEY}", url = "https://api.gnosisscan.io/api" }

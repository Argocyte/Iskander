# Iskander default values
# Override with values-minimal.yaml (8 GB) or values-standard.yaml (16 GB recommended)

global:
  # Cooperative identity — set during first-boot wizard
  cooperative:
    name: "My Cooperative"
    domain: ""          # e.g. sunrise.coop — leave blank to use Cloudflare tunnel
    timezone: "UTC"

  # Single shared PostgreSQL instance; each service gets its own database and role
  postgresql:
    auth:
      # Generated by first-boot script; not stored in values.yaml in production
      postgresPassword: ""
      username: "iskander"
      password: ""
      database: "iskander"
    host: "iskander-postgresql"
    port: 5432

  # Single shared Redis instance; each service uses a separate DB index
  redis:
    host: "iskander-redis-master"
    port: 6379
    auth:
      password: ""

  # Storage class — use local-path (K3s default) or any CSI driver
  storageClass: "local-path"

  # Image pull policy for all Iskander-built images
  imagePullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Shared PostgreSQL (Bitnami chart)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    postgresPassword: ""          # populated by install script
    username: "iskander"
    password: ""
    database: "iskander"
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    # Run init.sql to provision per-service databases on first start
    initdb:
      scriptsConfigMap: "iskander-initdb"

# ---------------------------------------------------------------------------
# Shared Redis (Bitnami chart)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: ""                  # populated by install script
  master:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"

# ---------------------------------------------------------------------------
# Namespace
# ---------------------------------------------------------------------------
namespace:
  name: "iskander"
  # Resource quota applied to the whole namespace
  resourceQuota:
    enabled: true
    hard:
      requests.cpu: "4"
      requests.memory: "8Gi"
      limits.cpu: "8"
      limits.memory: "12Gi"

# ---------------------------------------------------------------------------
# Network policy
# ---------------------------------------------------------------------------
networkPolicy:
  # Default-deny all ingress/egress within the namespace.
  # Each service chart adds its own allow rules.
  defaultDenyAll: true

# ---------------------------------------------------------------------------
# Future services (toggled off — installed by their own sub-values)
# ---------------------------------------------------------------------------
authentik:
  enabled: false
  image:
    repository: ghcr.io/goauthentik/server
    tag: "2024.12.1"         # pin; update intentionally
  # MUST be overridden by install script — never set here in production
  secretKey: ""
  logLevel: info

  postgresql:
    password: ""             # populated by install script

  email:
    host: ""                 # leave blank to disable email (air-gapped installs)
    port: 587
    useTLS: true
    from: ""                 # defaults to iskander@<domain>

  server:
    resources:
      requests:
        memory: "400Mi"
        cpu: "100m"
      limits:
        memory: "700Mi"
        cpu: "500m"

  worker:
    resources:
      requests:
        memory: "200Mi"
        cpu: "50m"
      limits:
        memory: "400Mi"
        cpu: "250m"

  ingress:
    enabled: true
    tls: true
    annotations: {}

loomio:
  enabled: false
  image:
    repository: loomio/loomio
    tag: "v2.23.0"            # pin; update intentionally

  # MUST be overridden by install script
  secretKeyBase: ""
  webhookSecret: ""           # shared secret for HMAC verification in decision-recorder

  postgresql:
    password: ""

  oidc:
    clientSecret: ""          # populated from Authentik bootstrap output

  smtp:
    host: ""
    port: 587
    useTLS: true
    password: ""

  uploadStorage: "5Gi"

  resources:
    requests:
      memory: "1Gi"
      cpu: "200m"
    limits:
      memory: "1.5Gi"
      cpu: "1000m"

  workerResources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  ingress:
    enabled: true
    tls: true
    annotations: {}

mattermost:
  enabled: false
  image:
    repository: mattermost/mattermost-team-edition
    tag: "9.11.0"             # pin; update intentionally

  postgresql:
    password: ""

  oidc:
    clientSecret: ""          # populated from Authentik bootstrap output

  # Bot token for the Clerk agent — generated by mattermost-bootstrap job
  clerkBotToken: ""

  dataStorage: "10Gi"

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  ingress:
    enabled: true
    tls: true
    annotations: {}

nextcloud:
  enabled: false
  image:
    repository: nextcloud
    tag: "28.0.4-apache"      # pin; update intentionally

  adminPassword: ""           # populated by install script

  postgresql:
    password: ""

  oidc:
    clientSecret: ""

  dataStorage: "20Gi"

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  ingress:
    enabled: true
    tls: true
    annotations: {}

openclaw:
  enabled: false
  image:
    repository: ghcr.io/argocyte/openclaw
    tag: "0.1.0"

  # Anthropic API key — required for Clerk agent
  anthropicApiKey: ""

  # Model for the Clerk agent (haiku is fast and cheap; sonnet for complex tasks)
  clerkModel: "claude-haiku-4-5-20251001"

  logLevel: "INFO"

  loomio:
    apiKey: ""

  mattermost:
    botToken: ""
    webhookToken: ""          # Mattermost outgoing webhook verification token
    botUserId: ""             # Populated after bot account is created
    governanceChannelId: ""   # Populated after mattermost-bootstrap runs

  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

ollama:
  enabled: false

ipfs:
  enabled: false
  image:
    repository: ipfs/kubo
    tag: "v0.27.0"
  dataStorage: "5Gi"
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Decision recorder is auto-enabled when loomio or openclaw is enabled (see template condition)
decisionRecorder:
  image:
    repository: ghcr.io/argocyte/decision-recorder
    tag: "0.1.0"
  logLevel: "INFO"
  postgresql:
    password: ""
  # Optional: enable in Phase B when Headscale mesh is active (adds auth on top of NetworkPolicy)
  internalServiceToken: ""
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "200m"

provisioner:
  enabled: true
  image:
    repository: ghcr.io/argocyte/provisioner
    tag: "0.1.0"
  logLevel: "INFO"

  postgresql:
    password: ""         # generated by first-boot script

  authentik:
    apiToken: ""         # Authentik service account token (admin scope)

  # Key of the Loomio cooperative group new members are added to
  loomioGroupKey: ""

  # Mattermost channel ID for the restricted onboarding channel (NOT #general)
  # Create this channel manually and copy its ID from the URL
  mattermostOnboardingChannel: ""

  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "200m"

vaultwarden:
  enabled: false
  image:
    repository: vaultwarden/server
    tag: "1.30.5"           # pin; update intentionally

  adminToken: ""            # populated by install script (argon2 hash recommended)
  dataStorage: "1Gi"

  postgresql:
    password: ""

  oidc:
    clientSecret: ""        # populated from Authentik bootstrap output

  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "200m"

  ingress:
    enabled: true
    tls: true
    annotations: {}

backrest:
  enabled: false
  image:
    repository: garethgeorge/backrest
    tag: "v1.4.0"           # pin; update intentionally

  # Restic repository encryption password — STORE THIS IN VAULTWARDEN
  # Losing this password means losing access to all backups.
  repositoryPassword: ""

  # Primary backup destination — local disk by default.
  # For off-site backups, enable s3 and set credentials below.
  repository:
    path: "/backups/restic"   # local path inside the pod (mount an external volume here)

  s3:
    enabled: false
    endpoint: "s3.amazonaws.com"
    bucket: ""
    region: "us-east-1"
    accessKeyId: ""
    secretAccessKey: ""

  # Staging area for PostgreSQL dumps before they are snapshotted
  pgStagingStorage: "5Gi"
  # Backrest state and config
  dataStorage: "2Gi"

  mattermost:
    webhookUrl: ""          # Mattermost incoming webhook URL for backup notifications

  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  ingress:
    enabled: true
    tls: true
    annotations: {}

cloudflared:
  enabled: false

beszel:
  enabled: false
  image:
    repository: henrygd/beszel
    tag: "latest"           # Beszel follows rolling tags; pin when stable release exists

  adminPassword: ""         # populated by install script

  dataStorage: "1Gi"

  alerts:
    diskThresholdPercent: 80
    memoryThresholdPercent: 90

  mattermost:
    webhookUrl: ""          # Mattermost incoming webhook URL for monitoring alerts

  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "96Mi"
      cpu: "200m"

  ingress:
    enabled: true
    tls: true
    annotations: {}

headscale:
  enabled: false

# Iskander default values
# Override with values-minimal.yaml (8 GB) or values-standard.yaml (16 GB recommended)

global:
  # Cooperative identity — set during first-boot wizard
  cooperative:
    name: "My Cooperative"
    domain: ""          # e.g. sunrise.coop — leave blank to use Cloudflare tunnel
    timezone: "UTC"

  # Single shared PostgreSQL instance; each service gets its own database and role
  postgresql:
    auth:
      # Generated by first-boot script; not stored in values.yaml in production
      postgresPassword: ""
      username: "iskander"
      password: ""
      database: "iskander"
    host: "iskander-postgresql"
    port: 5432

  # Single shared Redis instance; each service uses a separate DB index
  redis:
    host: "iskander-redis-master"
    port: 6379
    auth:
      password: ""

  # Storage class — use local-path (K3s default) or any CSI driver
  storageClass: "local-path"

  # Image pull policy for all Iskander-built images
  imagePullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Shared PostgreSQL (Bitnami chart)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    postgresPassword: ""          # populated by install script
    username: "iskander"
    password: ""
    database: "iskander"
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    # Run init.sql to provision per-service databases on first start
    initdb:
      scriptsConfigMap: "iskander-initdb"

# ---------------------------------------------------------------------------
# Shared Redis (Bitnami chart)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: ""                  # populated by install script
  master:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"

# ---------------------------------------------------------------------------
# Namespace
# ---------------------------------------------------------------------------
namespace:
  name: "iskander"
  # Resource quota applied to the whole namespace
  resourceQuota:
    enabled: true
    hard:
      requests.cpu: "4"
      requests.memory: "8Gi"
      limits.cpu: "8"
      limits.memory: "12Gi"

# ---------------------------------------------------------------------------
# Network policy
# ---------------------------------------------------------------------------
networkPolicy:
  # Default-deny all ingress/egress within the namespace.
  # Each service chart adds its own allow rules.
  defaultDenyAll: true

# ---------------------------------------------------------------------------
# Future services (toggled off — installed by their own sub-values)
# ---------------------------------------------------------------------------
authentik:
  enabled: false

loomio:
  enabled: false

mattermost:
  enabled: false

nextcloud:
  enabled: false

openclaw:
  enabled: false

ollama:
  enabled: false

ipfs:
  enabled: false

vaultwarden:
  enabled: false

backrest:
  enabled: false

cloudflared:
  enabled: false

beszel:
  enabled: false

headscale:
  enabled: false

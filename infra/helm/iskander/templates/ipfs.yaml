{{- if .Values.ipfs.enabled }}
# ---------------------------------------------------------------------------
# IPFS Kubo — content-addressed storage for decision records.
# Pinned decisions are tamper-evident: the CID changes if the content changes.
# Running in offline mode by default (no public swarm) — cooperative data
# stays on cooperative infrastructure. Peering with federation nodes is Phase B.
# ---------------------------------------------------------------------------

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ipfs-data
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
    app.kubernetes.io/component: ipfs
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.ipfs.dataStorage | default "5Gi" }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipfs-init
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
    app.kubernetes.io/component: ipfs
data:
  # Initialise IPFS repo with cooperative-appropriate settings:
  # - No public swarm (offline mode) — federation peering is Phase B
  # - API listening on all interfaces within the pod
  # - Gateway disabled (no public content serving)
  init.sh: |
    #!/bin/sh
    set -e
    if [ ! -f /data/ipfs/config ]; then
      ipfs init --profile=server
      # Disable public DHT and swarm — stay private until Phase B federation
      ipfs config --json Swarm.DisableNatPortMap true
      ipfs config --json Routing.Type '"none"'
      ipfs config --json Bootstrap '[]'
      # API accessible within the pod network
      ipfs config Addresses.API /ip4/0.0.0.0/tcp/5001
      # Disable gateway
      ipfs config Addresses.Gateway ""
      echo "IPFS initialised in private mode."
    fi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipfs
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
    app.kubernetes.io/component: ipfs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "iskander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ipfs
  template:
    metadata:
      labels:
        {{- include "iskander.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ipfs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init
          image: {{ .Values.ipfs.image.repository }}:{{ .Values.ipfs.image.tag }}
          command: ["/bin/sh", "/init/init.sh"]
          env:
            - name: IPFS_PATH
              value: /data/ipfs
          volumeMounts:
            - name: data
              mountPath: /data/ipfs
            - name: init-scripts
              mountPath: /init
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: ipfs
          image: {{ .Values.ipfs.image.repository }}:{{ .Values.ipfs.image.tag }}
          args: ["daemon", "--migrate=true", "--agent-version-suffix=iskander"]
          env:
            - name: IPFS_PATH
              value: /data/ipfs
          ports:
            - name: api
              containerPort: 5001
          livenessProbe:
            httpGet:
              path: /api/v0/id
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["ipfs", "id"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data/ipfs
          resources:
            {{- toYaml .Values.ipfs.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ipfs-data
        - name: init-scripts
          configMap:
            name: ipfs-init
            defaultMode: 0755

---
apiVersion: v1
kind: Service
metadata:
  name: ipfs
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
    app.kubernetes.io/component: ipfs
spec:
  type: ClusterIP
  selector:
    {{- include "iskander.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ipfs
  ports:
    - name: api
      port: 5001
      targetPort: api

---
# Only the decision-recorder may talk to the IPFS API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ipfs
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ipfs
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: decision-recorder
      ports:
        - port: 5001

{{- end }}{{/* ipfs.enabled */}}

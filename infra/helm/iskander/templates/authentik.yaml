{{- if .Values.authentik.enabled }}
# ---------------------------------------------------------------------------
# Authentik — OIDC / SSO identity provider
# One account for Loomio, Mattermost, Nextcloud, and the admin dashboard.
# ---------------------------------------------------------------------------

---
# Secret — generated by install script; never committed to version control
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secrets
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentik
type: Opaque
stringData:
  secret-key: {{ .Values.authentik.secretKey | quote }}
  postgresql-password: {{ .Values.authentik.postgresql.password | quote }}
  redis-password: {{ .Values.global.redis.auth.password | quote }}

---
# ConfigMap — non-secret Authentik environment
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-config
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentik
data:
  AUTHENTIK_LOG_LEVEL: {{ .Values.authentik.logLevel | default "info" | quote }}
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
  AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
  AUTHENTIK_DISABLE_STARTUP_ANALYTICS: "true"
  # PostgreSQL
  AUTHENTIK_POSTGRESQL__HOST: {{ include "iskander.postgresql.host" . | quote }}
  AUTHENTIK_POSTGRESQL__PORT: {{ .Values.global.postgresql.port | toString | quote }}
  AUTHENTIK_POSTGRESQL__NAME: "authentik"
  AUTHENTIK_POSTGRESQL__USER: "authentik"
  # Redis (DB index 1 — 0 reserved for Loomio)
  AUTHENTIK_REDIS__HOST: {{ include "iskander.redis.host" . | quote }}
  AUTHENTIK_REDIS__PORT: {{ .Values.global.redis.port | toString | quote }}
  AUTHENTIK_REDIS__DB: "1"
  # Email — set smtp values to enable outbound mail
  AUTHENTIK_EMAIL__HOST: {{ .Values.authentik.email.host | default "" | quote }}
  AUTHENTIK_EMAIL__PORT: {{ .Values.authentik.email.port | default 587 | toString | quote }}
  AUTHENTIK_EMAIL__USE_TLS: {{ .Values.authentik.email.useTLS | default true | toString | quote }}
  AUTHENTIK_EMAIL__FROM: {{ .Values.authentik.email.from | default (printf "iskander@%s" .Values.global.cooperative.domain) | quote }}

---
# Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-server
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "iskander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: authentik-server
  template:
    metadata:
      labels:
        {{- include "iskander.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: authentik-server
        iskander.coop/db-access: postgresql
        iskander.coop/db-access-redis: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: authentik-server
          image: {{ .Values.authentik.image.repository }}:{{ .Values.authentik.image.tag }}
          args: ["server"]
          envFrom:
            - configMapRef:
                name: authentik-config
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: postgresql-password
            - name: AUTHENTIK_REDIS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: redis-password
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
            - name: https
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 9300
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/health/live/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.authentik.server.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

---
# Worker Deployment (background tasks: email, events, flows)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "iskander.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: authentik-worker
  template:
    metadata:
      labels:
        {{- include "iskander.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: authentik-worker
        iskander.coop/db-access: postgresql
        iskander.coop/db-access-redis: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: authentik-worker
          image: {{ .Values.authentik.image.repository }}:{{ .Values.authentik.image.tag }}
          args: ["worker"]
          envFrom:
            - configMapRef:
                name: authentik-config
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: postgresql-password
            - name: AUTHENTIK_REDIS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secrets
                  key: redis-password
          resources:
            {{- toYaml .Values.authentik.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

---
# Service — cluster-internal access; ingress exposes it externally
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-server
spec:
  type: ClusterIP
  selector:
    {{- include "iskander.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP

---
# NetworkPolicy — allow ingress from K3s ingress controller + inter-service SSO
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-ingress
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: authentik-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # K3s Traefik ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 9000
        - port: 9443
    # Other Iskander services doing OIDC token verification
    - from:
        - podSelector:
            matchLabels:
              iskander.coop/oidc-client: authentik
      ports:
        - port: 9000
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: 6379
    # SMTP (if configured)
    - ports:
        - port: 587
        - port: 465

---
# Ingress — route /sso through Traefik to Authentik
{{- if .Values.authentik.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- with .Values.authentik.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: traefik
  {{- if .Values.authentik.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.global.cooperative.domain | quote }}
      secretName: authentik-tls
  {{- end }}
  rules:
    - host: {{ .Values.global.cooperative.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik
                port:
                  name: http
{{- end }}

{{- end }}{{/* authentik.enabled */}}

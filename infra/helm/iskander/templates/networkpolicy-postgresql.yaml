{{- if .Values.postgresql.enabled }}
# Allow services with label iskander.coop/db-access: postgresql to reach PostgreSQL.
# Each application subchart sets this label on its pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgresql
  namespace: {{ include "iskander.namespace" . }}
  labels:
    {{- include "iskander.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              iskander.coop/db-access: postgresql
      ports:
        - port: 5432
          protocol: TCP
{{- end }}

apiVersion: v2
name: iskander
description: Lunarpunk cooperative infrastructure — K3s umbrella chart
type: application
version: 0.1.0
appVersion: "0.1.0"

keywords:
  - cooperative
  - governance
  - lunarpunk
  - web3

home: https://github.com/Argocyte/Iskander
sources:
  - https://github.com/Argocyte/Iskander

maintainers:
  - name: Iskander Contributors
    url: https://github.com/Argocyte/Iskander

dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

  - name: redis
    version: "20.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled

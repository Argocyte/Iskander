# Standard profile — 16 GB RAM recommended
# Production-ready single node. Add worker nodes with `k3s agent` for resilience.

namespace:
  resourceQuota:
    hard:
      requests.cpu: "8"
      requests.memory: "12Gi"
      limits.cpu: "16"
      limits.memory: "16Gi"

postgresql:
  primary:
    persistence:
      size: 20Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "1000m"

redis:
  master:
    persistence:
      size: 2Gi
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "500m"

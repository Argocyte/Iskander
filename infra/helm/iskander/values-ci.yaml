# CI values override — K3d single-node cluster
# Overrides values.yaml for GitHub Actions integration tests.
# Secrets are injected via environment variables by the CI workflow.
#
# Required secrets (set via helm upgrade --set or CI environment):
#   global.postgresql.auth.postgresPassword
#   global.postgresql.auth.password
#   decisionRecorder.postgresql.password
#   decisionRecorder.loomio.webhookSecret  (can be "ci-secret" in CI)
#   openclaw.anthropicApiKey               (real key or "ci-skip" to skip AI tests)
#   openclaw.mattermost.botToken
#   openclaw.loomio.apiKey
#   provisioner.postgresql.password
#   provisioner.authentik.apiToken

global:
  cooperative:
    name: "CI Test Cooperative"
    domain: ""

# Disable resource-heavy services not needed for smoke tests
nextcloud:
  enabled: false

vaultwarden:
  enabled: false

backrest:
  enabled: false

beszel:
  enabled: false

# openclaw is not smoke-tested directly; disable to avoid ImagePullBackOff
openclaw:
  enabled: false

# Custom service images are built and imported into K3d by the CI workflow.
# imagePullPolicy: IfNotPresent tells Kubernetes to use the locally imported image
# rather than attempting a registry pull (which would fail for unreleased images).
decisionRecorder:
  image:
    repository: ghcr.io/argocyte/decision-recorder
    tag: "ci"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"

provisioner:
  enabled: true
  image:
    repository: ghcr.io/argocyte/provisioner
    tag: "ci"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"

stewardData:
  enabled: true
  image:
    repository: ghcr.io/argocyte/steward-data
    tag: "ci"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"

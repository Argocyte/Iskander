---
# secrets role — generates all cooperative secrets and writes them to a values file.
# Uses openssl for cryptographically random secrets.
# Idempotent: only generates secrets that don't already exist in the cluster.

- name: Check if Iskander secrets already exist
  command: kubectl -n "{{ iskander_namespace }}" get secret iskander-install-state
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: secrets_exist
  failed_when: false
  changed_when: false

- name: Generate secrets (first install only)
  when: secrets_exist.rc != 0
  block:
    - name: Generate PostgreSQL root password
      command: openssl rand -base64 32
      register: pg_root_password
      changed_when: false

    - name: Generate per-service PostgreSQL passwords
      command: openssl rand -base64 32
      register: "pg_{{ item }}_password"
      changed_when: false
      loop:
        - authentik
        - loomio
        - mattermost
        - nextcloud
        - decision_recorder

    - name: Generate Redis password
      command: openssl rand -base64 32
      register: redis_password
      changed_when: false

    - name: Generate Authentik secret key
      command: openssl rand -base64 50
      register: authentik_secret_key
      changed_when: false

    - name: Generate Loomio secret key base
      command: openssl rand -hex 64
      register: loomio_secret_key_base
      changed_when: false

    - name: Generate webhook secrets
      command: openssl rand -hex 32
      register: "{{ item }}_secret"
      changed_when: false
      loop:
        - loomio_webhook
        - mattermost_outgoing_webhook

    - name: Generate Backrest repository password
      command: openssl rand -base64 32
      register: backrest_repo_password
      changed_when: false

    - name: Generate Vaultwarden admin token
      # Vaultwarden supports plain tokens; argon2 recommended in production
      command: openssl rand -base64 48
      register: vaultwarden_admin_token
      changed_when: false

    - name: Store generated secrets in a K8s ConfigMap (non-sensitive) for idempotency tracking
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: iskander-install-state
            namespace: "{{ iskander_namespace }}"
          data:
            installed_at: "{{ ansible_date_time.iso8601 }}"
            coop_name: "{{ coop_name }}"
            domain: "{{ domain }}"

    - name: Set secret facts for use in values template
      set_fact:
        generated_secrets:
          pg_root_password: "{{ pg_root_password.stdout }}"
          pg_authentik_password: "{{ pg_authentik_password.stdout }}"
          pg_loomio_password: "{{ pg_loomio_password.stdout }}"
          pg_mattermost_password: "{{ pg_mattermost_password.stdout }}"
          pg_nextcloud_password: "{{ pg_nextcloud_password.stdout }}"
          pg_decision_recorder_password: "{{ pg_decision_recorder_password.stdout }}"
          redis_password: "{{ redis_password.stdout }}"
          authentik_secret_key: "{{ authentik_secret_key.stdout }}"
          loomio_secret_key_base: "{{ loomio_secret_key_base.stdout }}"
          loomio_webhook_secret: "{{ loomio_webhook_secret.stdout }}"
          mattermost_webhook_secret: "{{ mattermost_outgoing_webhook_secret.stdout }}"
          backrest_repo_password: "{{ backrest_repo_password.stdout }}"
          vaultwarden_admin_token: "{{ vaultwarden_admin_token.stdout }}"

- name: Load existing secrets (upgrade path)
  when: secrets_exist.rc == 0
  block:
    - name: Warn that existing secrets will be preserved
      debug:
        msg: "Existing installation detected. Secrets will be preserved (upgrade mode)."

    # In upgrade mode, secrets are read from existing K8s Secrets by Helm directly.
    # We don't need to re-generate or re-read them here.
    - name: Set empty facts for upgrade (Helm reads from existing secrets)
      set_fact:
        generated_secrets: {}

- name: Write Helm values file
  template:
    src: generated-values.yaml.j2
    dest: "{{ values_output_path }}"
    mode: "0600"  # Secrets file — owner-readable only
  when: secrets_exist.rc != 0
